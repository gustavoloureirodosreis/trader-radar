name: daily-snapshot

on:
  schedule:
    - cron: "0 12 * * *" # 09:00 America/Sao_Paulo (UTC-3)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run snapshot
        env:
          PACIFICA_API_KEY: ${{ secrets.PACIFICA_API_KEY }}
        run: python -m trader_radar
      - name: Commit snapshot data
        run: |
          git config user.name "trader-radar bot"
          git config user.email "actions@users.noreply.github.com"
          git add snapshots
          git commit -m "snapshot $(date -u +%F)" || echo "nothing to commit"
          git pull --rebase origin main
          git push
      - name: Build site
        run: python build_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: snapshot
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
